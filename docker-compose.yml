services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stillwater
      POSTGRES_PASSWORD: stillwater
      POSTGRES_DB: stillwater
    ports:
      - "5433:5432"
    volumes:
      - stillwater-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stillwater"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  main-website:
    build:
      context: .
    environment:
      PORT: 3000
      DATABASE_URL: postgres://stillwater:stillwater@db:5432/stillwater
      SESSION_SECRET: ${SESSION_SECRET:-stillwater-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      BASE_URL: http://localhost:3005
      CORS_ORIGIN: http://localhost:3005
      RECOMMENDATION_API_URL: http://recommendation-backend:3001
      RECOMMENDATION_UI_URL: http://recommendation-frontend:3000
    ports:
      - "3005:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/funds"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  recommendation-backend:
    build:
      context: ./Recommendation_Website/backend
    environment:
      PORT: 3001
      DATABASE_URL: postgres://stillwater:stillwater@db:5432/stillwater?schema=recommendation
      SESSION_SECRET: ${SESSION_SECRET:-stillwater-secret}
      CORS_ORIGIN: http://localhost:3005
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME}
    ports:
      - "3006:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  recommendation-frontend:
    build:
      context: ./Recommendation_Website/frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3005/recommendation/api
        NEXT_PUBLIC_AUTH_BASE_URL: http://localhost:3005
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3005/recommendation/api
      NEXT_PUBLIC_AUTH_BASE_URL: http://localhost:3005
    depends_on:
      recommendation-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/recommendation"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  stillwater-db:
