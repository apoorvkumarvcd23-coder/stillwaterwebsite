<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifestyle | Stillwater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/assessment.css" />
  </head>
  <body>
    <main class="assessment-page">
      <section class="assessment-header">
        <span class="assessment-kicker">Step 3 of 7</span>
        <h1 class="assessment-title">Daily lifestyle</h1>
        <p class="assessment-subtitle">
          Help us understand your routine and daily habits.
        </p>
      </section>

      <section class="form-card">
        <div class="progress-bar">
          <div class="progress-fill" style="width: 42%"></div>
        </div>

        <form data-assessment data-next="/recommendation/conditions.html">
          <div class="form-grid two-col">
            <div class="form-field">
              <label for="bed_time">When do you go to bed?</label>
              <input id="bed_time" name="bed_time" type="text" placeholder="e.g., 10:30 PM" />
            </div>
            <div class="form-field">
              <label for="wake_up_time">When do you wake up?</label>
              <input id="wake_up_time" name="wake_up_time" type="text" placeholder="e.g., 6:30 AM" />
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="form-field">
              <label for="water_glasses">Glasses of water per day</label>
              <input id="water_glasses" name="water_glasses" type="number" min="0" placeholder="Number of glasses" />
            </div>
            <div class="form-field">
              <label for="exercise_info">Exercise routine</label>
              <input id="exercise_info" name="exercise_info" type="text" placeholder="e.g., 30 min walk" />
            </div>
          </div>

          <div class="form-actions">
            <a class="btn-link" href="/recommendation/diet.html">Back</a>
            <button class="btn-primary" type="submit">Continue</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/assessment.js"></script>
  </body>
</html>
