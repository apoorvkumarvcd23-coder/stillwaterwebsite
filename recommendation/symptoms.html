<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symptoms | Stillwater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/assessment.css" />
  </head>
  <body>
    <main class="assessment-page">
      <section class="assessment-header">
        <span class="assessment-kicker">Step 5 of 7</span>
        <h1 class="assessment-title">Current symptoms</h1>
        <p class="assessment-subtitle">
          Select the symptoms you are experiencing and add any details.
        </p>
      </section>

      <section class="form-card">
        <div class="progress-bar">
          <div class="progress-fill" style="width: 70%"></div>
        </div>

        <form data-assessment data-next="/recommendation/goals.html">
          <div class="form-field">
            <label>Symptoms (select all that apply)</label>
            <div class="option-grid three-col">
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="tired eyes" />
                Tired eyes
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="blurred vision" />
                Blurred vision
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="headaches" />
                Headaches
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="insomnia" />
                Insomnia
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="body pain" />
                Body pain
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="constant stress" />
                Constant stress
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="low energy" />
                Low energy
              </label>
              <label class="option-card">
                <input type="checkbox" name="symptoms[]" value="burnout" />
                Burnout
              </label>
            </div>
          </div>

          <div class="form-field">
            <label for="symptom_text">Describe any other symptoms (optional)</label>
            <textarea
              id="symptom_text"
              name="symptom_text"
              rows="3"
              placeholder="E.g., My eyes hurt after long coding sessions"
            ></textarea>
          </div>

          <div class="form-actions">
            <a class="btn-link" href="/recommendation/conditions.html">Back</a>
            <button class="btn-primary" type="submit">Continue</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/assessment.js"></script>
  </body>
</html>
