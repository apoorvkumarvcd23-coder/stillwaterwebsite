<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wellness Assessment | Stillwater</title>
    <meta
      name="description"
      content="Begin your wellness assessment to help our experts understand your goals."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/assessment.css" />
  </head>
  <body>
    <main class="assessment-page">
      <section class="assessment-header">
        <span class="assessment-kicker">Step 1 of 7</span>
        <h1 class="assessment-title">Start with the basics</h1>
        <p class="assessment-subtitle">
          Tell us a little about yourself so we can tailor the review to you.
        </p>
      </section>

      <section class="form-card">
        <div class="progress-bar">
          <div class="progress-fill" style="width: 14%"></div>
        </div>

        <form data-assessment data-next="/recommendation/diet.html">
          <div class="form-grid two-col">
            <div class="form-field">
              <label for="age">Age</label>
              <input id="age" name="age" type="number" min="1" placeholder="Enter your age" />
            </div>
            <div class="form-field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender">
                <option value="">Select...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="form-field">
              <label for="height">Height (cm)</label>
              <input id="height" name="height" type="number" min="1" placeholder="Height in cm" />
            </div>
            <div class="form-field">
              <label for="weight">Weight (kg)</label>
              <input id="weight" name="weight" type="number" min="1" placeholder="Weight in kg" />
            </div>
          </div>

          <div class="form-field">
            <label>Occupation Type</label>
            <div class="option-grid three-col">
              <label class="option-card">
                <input type="radio" name="occupation_type" value="Desk job" />
                Desk job
              </label>
              <label class="option-card">
                <input type="radio" name="occupation_type" value="Physical work" />
                Physical work
              </label>
              <label class="option-card">
                <input type="radio" name="occupation_type" value="Student" />
                Student
              </label>
            </div>
          </div>

          <div class="form-actions">
            <a class="btn-link" href="/">Back to home</a>
            <button class="btn-primary" type="submit">Continue</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/assessment.js"></script>
  </body>
</html>
