<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Goals | Stillwater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/assessment.css" />
  </head>
  <body>
    <main class="assessment-page">
      <section class="assessment-header">
        <span class="assessment-kicker">Step 6 of 7</span>
        <h1 class="assessment-title">Your health goals</h1>
        <p class="assessment-subtitle">
          Share what you want to achieve, so we can focus on the right support.
        </p>
      </section>

      <section class="form-card">
        <div class="progress-bar">
          <div class="progress-fill" style="width: 84%"></div>
        </div>

        <form data-assessment data-next="/recommendation/contact.html">
          <div class="form-field">
            <label for="health_goals">Tell us about your goals</label>
            <textarea
              id="health_goals"
              name="health_goals"
              rows="4"
              placeholder="E.g., weight loss, better vision, more energy"
            ></textarea>
          </div>

          <div class="form-field">
            <label for="goals">Specific goals (optional)</label>
            <input
              id="goals"
              name="goals"
              type="text"
              placeholder="Add a short list, separated by commas"
            />
            <p class="inline-note">
              If you enter multiple goals, separate them with commas.
            </p>
          </div>

          <div class="form-actions">
            <a class="btn-link" href="/recommendation/symptoms.html">Back</a>
            <button class="btn-primary" type="submit">Continue to contact</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/assessment.js"></script>
  </body>
</html>
