services:
  # ── 1. Main website ──────────────────────────────────────────────────────────
  - type: web
    name: stillwater-main
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/funds
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stillwater-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # Set to your Render URL, e.g. https://stillwater-main.onrender.com
      - key: BASE_URL
        sync: false
      # Set to your Render URL, e.g. https://stillwater-main.onrender.com
      - key: CORS_ORIGIN
        sync: false
      # e.g. .onrender.com  (leading dot so cookie spans all subdomains)
      - key: COOKIE_DOMAIN
        sync: false

databases:
  - name: stillwater-postgres
    plan: free
    databaseName: stillwater
    user: stillwater
